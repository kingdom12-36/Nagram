name: Release Build Optimized
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '!.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      upload:
        description: 'Upload: If want ignore'
        required: false

jobs:
  build:
    name: Fast Unified Build (arm64-v8a)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. إعداد البيئة (مرة واحدة فقط لكل الـ Build)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@v3

      - name: Install NDK (Fast Shared Step)
        run: |
          echo "y" | sdkmanager --install "ndk;27.2.12479018" --sdk_root=${ANDROID_SDK_ROOT} &> /dev/null
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "ndk.dir=${ANDROID_HOME}/ndk/27.2.12479018" >> local.properties

      - name: Fetch Submodule Status
        run: |
          sed -i 's/\/\///g' settings.gradle
          git submodule status TMessagesProj/jni/ffmpeg > ffmpeg_status
          git submodule status TMessagesProj/jni/libvpx > libvpx_status
          git submodule status TMessagesProj/jni/boringssl > boringssl_status

      # 2. استدعاء الكاش المدمج (توفير وقت الـ Network)
      - name: Unified Native Components Cache
        id: native-cache
        uses: actions/cache@v4
        with:
          path: |
            TMessagesProj/jni/ffmpeg/build
            TMessagesProj/jni/libvpx/build
            TMessagesProj/jni/boringssl/build
            TMessagesProj/src/main/libs
          key: native-libs-${{ hashFiles('TMessagesProj/jni/**', 'ffmpeg_status', 'libvpx_status', 'boringssl_status') }}-arm64-v8a

      # 3. بناء المكونات النيتيف فقط إذا لم تكن بالكاش (Conditional Execution)
      - name: Checkout Submodule Libraries
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: |
          git submodule update --init 'TMessagesProj/jni/*'

      - name: Build FFmpeg & BoringSSL
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: |
          ./run init action ffmpeg
          ./run init libs libvpx
          ./run init libs ffmpeg
          ./run init action boringssl
          ./run init libs boringssl
          cd TMessagesProj/jni && ./patch_boringssl.sh

      - name: Compile Telegram Native Libraries (arm64-v8a)
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: |
          export NATIVE_TARGET="arm64-v8a"
          ./run libs native

      # 4. خطوة الـ Gradle والـ Keystore
      - name: Configure Gradle Properties
        run: |
          sed -i "s/2000000000000/$(date +%s%3N)/g" gradle.properties
          echo "sdk.dir=${ANDROID_HOME}" >> local.properties

      - name: Setup Gradle Cache System
        uses: gradle/actions/setup-gradle@v6

      - name: Generate signing keystore
        run: |
          KEYSTORE_PASS="nagram"
          ALIAS_NAME="nagram"
          ALIAS_PASS="nagram"
          KEYSTORE_PATH="TMessagesProj/release.keystore"
          rm -f "$KEYSTORE_PATH"
          
          keytool -genkey -v \
            -keystore "$KEYSTORE_PATH" \
            -alias "$ALIAS_NAME" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KEYSTORE_PASS" \
            -keypass "$ALIAS_PASS" \
            -dname "CN=Nagram, OU=Dev, O=Nagram, L=Global, S=Global, C=US"
          
          cat << EOF > temp.properties
          KEYSTORE_PASS=$KEYSTORE_PASS
          ALIAS_NAME=$ALIAS_NAME
          ALIAS_PASS=$ALIAS_PASS
          TELEGRAM_APP_ID=${{ secrets.TELEGRAM_APP_ID }}
          TELEGRAM_APP_HASH=${{ secrets.TELEGRAM_APP_HASH }}
          EOF
          echo "LOCAL_PROPERTIES=$(base64 -w 0 temp.properties)" >> $GITHUB_ENV
          rm temp.properties

      - name: Write Firebase google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON secret not set — keeping repo copy."
          else
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > TMessagesProj/google-services.json
          fi

      # 5. بناء الـ APK النهائي بسرعات مضافة (--parallel و --org.gradle.jvmargs)
      - name: Release Build APK
        run: |
          export NATIVE_TARGET="arm64-v8a"
          ./gradlew TMessagesProj:assembleRelease \
            --build-cache \
            --parallel \
            --no-configuration-cache \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseParallelGC"

          APK=$(find TMessagesProj/build/outputs/apk -name '*arm64-v8a*.apk')
          APK=$(dirname $APK)
          echo "APK=$APK" >> $GITHUB_ENV

      - name: Upload gradle.properties
        uses: actions/upload-artifact@v4
        with:
          name: gradle-properties
          path: gradle.properties

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Release
          path: ${{ env.APK }}

  upload:
    name: Upload release to Telegram
    if: github.event.inputs.upload != 'y'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Download gradle.properties
        uses: actions/download-artifact@v4
        with:
          name: gradle-properties
          path: .
      - name: Download APK Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Send to Telegram Channel/Bot
        run: |
          export mini64=$(find artifacts -name "*arm64-v8a.apk")
          echo $mini64
          python -m pip install -r bin/scripts/requirements.txt
          git log -1 --pretty=format:"%s%n%n%b" > artifacts/caption.txt
          python bin/scripts/upload.py ${{ secrets.HELPER_BOT_TOKEN }} ${{ secrets.HELPER_BOT_TARGET }} release
